[manager]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
show_hidden = false
show_symlink = true

[preview]
max_width = 600
max_height = 900

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]
open = [
  { run = 'wslview "$@"', orphan = true, for = "unix" },
]

[open]
prepend_rules = [
  { mime = "application/vnd.openxmlformats-officedocument.*", use = "open" },
  { mime = "application/vnd.ms-excel*", use = "open" },
  { mime = "application/msword*", use = "open" },
  { mime = "application/vnd.ms-powerpoint*", use = "open" },
  { mime = "application/pdf", use = "open" },
  { mime = "image/*", use = "open" },
]

[plugin]
prepend_previewers = [
  { name = "*.md", run = "code", sync = true },
]
