snippets:
  # Git関連のスニペット
  - name: git status
    keyword: gs
    snippet: git status --short --branch

  - name: git add all
    keyword: gaa
    snippet: git add .

  - name: git commit
    keyword: gc
    snippet: git commit -m "{{commit message}}"

  - name: git push
    keyword: gp
    snippet: git push origin {{branch}}

  # エディタ
  - name: nvim (vi)
    keyword: vi
    snippet: nvim

  # CLI
  - name: claude
    keyword: c
    snippet: claude

  - name: claude-watch
    keyword: cw
    snippet: claude-watch

  # gh-dash
  - name: gh-dash
    keyword: ghd
    snippet: gh auth switch --user eBASE-Mori && gh-dash

  # バックアップ
  - name: backup
    keyword: bak
    snippet: ~/.dotfiles/scripts/backup/backup-wsl-to-windows.sh

  # eza (ls replacement)
  - name: ls
    keyword: ls
    snippet: eza --icons --group-directories-first

  - name: ls all
    keyword: la
    snippet: eza -a --icons --group-directories-first

  - name: ls by time
    keyword: lt
    snippet: eza -l --sort=time --icons --group-directories-first

  - name: ls by size
    keyword: lz
    snippet: eza -l --sort=size --icons --group-directories-first

  - name: ls git-ignore
    keyword: lg
    snippet: eza -l --icons --group-directories-first --git --git-ignore

  - name: tree
    keyword: tree
    snippet: eza --tree --level=2 --icons

  - name: tree all
    keyword: treea
    snippet: eza --tree --level=2 --icons -a

  # npm
  - name: npm dev
    keyword: npmd
    snippet: npm run dev -- -H 0.0.0.0

  - name: npm storybook
    keyword: npms
    snippet: npm run storybook -- --host 0.0.0.0

  # 勤怠打刻
  - name: kintai in
    keyword: ki
    snippet: /mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -Command "python 'D:\\個人用\\script\\kintai\\kintai_auto_checkin.py'"

  - name: kintai out
    keyword: ko
    snippet: /mnt/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe -Command "python 'D:\\個人用\\script\\kintai\\kintai_auto_checkout.py'"

  # tmux
  - name: tmux attach
    keyword: ta
    snippet: tmux attach -t

  - name: tmux list sessions
    keyword: tl
    snippet: tmux list-sessions

  - name: tmux kill session
    keyword: tks
    snippet: tmux kill-session -t

  - name: tmux kill server
    keyword: tkss
    snippet: tmux kill-server

  # nb関連のスニペット（プレースホルダ付きのみ残す）
  - name: nb search
    keyword: nbs
    snippet: nb search "{{keyword}}"

  - name: nb add note
    keyword: nba
    snippet: nb add "{{title}}"

  - name: nb task add
    keyword: nbta
    snippet: nbt "{{task}}" -d {{due}} -t {{tags}}

completions:
  # nb補完設定
  - name: nb notebooks
    patterns:
      - "^nb (.*)$"
    sourceCommand: "nb notebooks --names --no-color"
    options:
      --prompt: "'Notebook> '"
      --preview: "nb {1}:list --limit 10"

  - name: nb notes
    patterns:
      - "^nb ([^:]+):(.*)$"
    sourceCommand: "nb {1}:list --no-color --filenames"
    options:
      --prompt: "'Note> '"
      --preview: "nb {1}:show {}"

  - name: nb daily notes
    patterns:
      - "^nb daily:(.*)$"
    sourceCommand: "nb daily:list --no-color --filenames"
    options:
      --prompt: "'Daily Note> '"
      --preview: "nb daily:show {}"

  - name: git branches
    patterns:
      - "^git checkout (.*)$"
      - "^git switch (.*)$"
    sourceCommand: "git branch --all | sed 's/^[* ]*//' | sed 's#remotes/origin/##'"
    options:
      --prompt: "'Branch> '"
      --preview: "git log --oneline --graph --color=always {}"

  - name: git modified files
    patterns:
      - "^git add (.*)$"
    sourceCommand: "git status --short | awk '{print $2}'"
    options:
      --prompt: "'Add Files> '"
      --multi: true

  # nb タスクID補完（nbtd, nbtu用）
  - name: nb task id
    patterns:
      - "^nbtd (.*)$"
      - "^nbtu (.*)$"
    sourceCommand: "nb tasks:todos open --no-color | awk '{print $1}' | tr -d '[]'"
    options:
      --prompt: "'Task ID> '"
      --preview: "nb tasks:show {}"
